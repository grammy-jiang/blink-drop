<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Scan an animated QR code with your phone camera to receive a file offline — reconstructed and SHA-256-verified on-device, nothing uploaded."
    />
    <title>Blink-Drop — Receiver</title>
    <meta name="theme-color" content="#111827" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Blink-Drop" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23111827'/%3E%3Crect x='9' y='9' width='6' height='6' fill='%23f9fafb'/%3E%3Crect x='17' y='9' width='6' height='6' fill='%23f9fafb'/%3E%3Crect x='9' y='17' width='6' height='6' fill='%23f9fafb'/%3E%3Ccircle cx='20' cy='20' r='4' fill='%232563eb'/%3E%3C/svg%3E" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html { height: 100%; }
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        /* Percentage height (via html height:100%) fills the viewport without the
           iOS dynamic-toolbar over-scroll — and without the top-align that vh/dvh/
           svh caused. min-height (not height) so tall content can still grow + scroll. */
        min-height: 100%;
        display: flex;
        flex-direction: column;
      }
      #app { flex: 1; display: flex; }
      .brand { font-size: 1.25rem; font-weight: 700; margin: 0; }
      /* Identical centering to the sender's .content: margin:auto centers the
         content in both axes at ANY resolution and is overflow-safe (collapses
         to a scrollable top-aligned layout when content exceeds the viewport,
         instead of clipping). */
      .screen {
        margin: auto;
        width: 100%;
        max-width: 640px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 1.2rem;
        text-align: center;
      }
      .hint { color: #6b7280; max-width: 32ch; }
      .loud { font-size: 1.2rem; font-weight: 700; color: #b91c1c; }
      .viewfinder {
        position: relative;
        width: min(90vw, 480px);
        aspect-ratio: 1;
        background: #000;
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .viewfinder video { width: 100%; height: 100%; object-fit: cover; }
      .target {
        position: absolute;
        inset: 12%;
        border: 3px solid rgba(255, 255, 255, 0.85);
        border-radius: 10px;
        pointer-events: none;
      }
      .progress { font-variant-numeric: tabular-nums; font-weight: 600; }
      .stall { color: #b45309; min-height: 1.2em; }
      .card {
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 1.4rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        align-items: center;
        min-width: min(90vw, 360px);
      }
      .badges { display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center; }
      .badge {
        color: #047857;
        font-weight: 700;
        background: #ecfdf5;
        padding: 0.2rem 0.7rem;
        border-radius: 999px;
      }
      .badge.lock { color: #1e40af; background: #eff6ff; }
      .enc-note { max-width: 34ch; }
      .filelist { text-align: left; margin: 0.4rem 0; padding-left: 1.2rem; color: #374151; font-size: 0.9rem; max-width: 34ch; word-break: break-all; }
      @media (prefers-color-scheme: dark) { .filelist { color: #d1d5db; } }
      .pp {
        padding: 0.55rem 0.7rem;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        background: #fff;
        font-size: 1rem;
        width: min(80vw, 320px);
      }
      .fname { font-weight: 700; word-break: break-all; }
      .meta { color: #6b7280; font-size: 0.9rem; }
      .actions { display: flex; gap: 0.6rem; flex-wrap: wrap; justify-content: center; margin-top: 0.4rem; }
      .shareresult { color: #6b7280; font-size: 0.9rem; min-height: 1.2em; }
      button {
        padding: 0.6rem 1.1rem;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        background: #fff;
        font-size: 1rem;
        cursor: pointer;
      }
      button.primary { background: #111827; color: #fff; border-color: #111827; }
      button.ghost { border: none; background: transparent; color: #6b7280; }
      .install {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        background: #f3f4f6;
        color: #374151;
        border-radius: 10px;
        padding: 0.5rem 0.7rem;
        font-size: 0.85rem;
        max-width: 34ch;
      }
      .install button { padding: 0.1rem 0.45rem; font-size: 0.9rem; line-height: 1; }
      @media (prefers-color-scheme: dark) {
        .card { border-color: #374151; }
        button { background: #1f2937; color: #f9fafb; border-color: #374151; }
        button.primary { background: #2563eb; border-color: #2563eb; }
        .install { background: #1f2937; color: #d1d5db; }
        .badge.lock { color: #bfdbfe; background: #1e293b; }
        .pp { background: #1f2937; color: #f9fafb; border-color: #374151; }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="/src/ui/receiver.ts"></script>
  </body>
</html>
