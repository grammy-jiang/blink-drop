<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Turn one or more files into an animated QR code stream to send them to a nearby phone — processed on your machine, never uploaded. Fully offline."
    />
    <meta name="theme-color" content="#faf9f5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141413" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23141413'/%3E%3Crect x='9' y='9' width='6' height='6' fill='%23faf9f5'/%3E%3Crect x='17' y='9' width='6' height='6' fill='%23faf9f5'/%3E%3Crect x='9' y='17' width='6' height='6' fill='%23faf9f5'/%3E%3Ccircle cx='20' cy='20' r='4' fill='%23b0512e'/%3E%3C/svg%3E" />
    <title>Blink-Drop — Sender</title>
    <style>
      /* Shared design language with the receiver (receiver.html): same shell
         (header + centered content), tokens, buttons, and dark mode.
         Colors live as :root custom properties (one authoritative home).
         Warm palette adapted from anthropic.com; brand wordmark is serif,
         UI text stays sans for legibility. Dark mode swaps the token values
         once, rather than overriding each rule. */
      :root {
        color-scheme: light dark;
        --paper: #faf9f5;    /* warm ivory page background */
        --card: #f0eee6;     /* cream surface */
        --ink: #141413;      /* warm near-black text */
        --muted: #6b6960;    /* warm gray — hints, meta, secondary (WCAG AA on paper + card) */
        --accent: #b0512e;   /* terracotta "book-cloth" clay — darkened for WCAG AA (4.9:1 text, 5.2:1 under white) */
        --accent-ink: #ffffff;
        --border: #e3dacc;   /* greige */
        --tan: #f5e3c7;      /* warm tan — dropzone drag/hover fill */
        --field: #ffffff;    /* input background */
        --field-ink: #141413;
        --warn: #b45309;
        --serif: Georgia, "Times New Roman", serif;
        --sans: system-ui, -apple-system, Arial, sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --paper: #141413;
          --card: #201f1d;
          --ink: #faf9f5;
          --muted: #a8a59d;
          --accent: #d97757;  /* lighter clay for contrast on near-black */
          --accent-ink: #141413;
          --border: #33322e;
          --tan: #2a2723;
          --field: #201f1d;
          --field-ink: #faf9f5;
          --warn: #f59e0b;
        }
      }
      * { box-sizing: border-box; }
      html { height: 100%; }
      body {
        font-family: var(--sans);
        color: var(--ink);
        background: var(--paper);
        margin: 0;
        /* Percentage height (via html height:100%) fills the viewport without the
           iOS dynamic-toolbar over-scroll — and without the top-align that vh/dvh/
           svh caused. min-height (not height) so tall content (the play stage)
           can still grow + scroll. */
        min-height: 100%;
        display: flex;
        flex-direction: column;
      }
      main { flex: 1; display: flex; }
      /* Serif wordmark — the one editorial display note; UI text stays sans. */
      .brand { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
      /* `margin: auto` centers the content in both axes AND is overflow-safe:
         it collapses to a top-aligned, scrollable layout when the playing stage
         grows taller than the viewport. */
      .content {
        margin: auto;
        width: 100%;
        max-width: 640px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 1.2rem;
        text-align: center;
      }
      .tagline { color: var(--muted); margin: 0; }
      /* Drop zone is the label for the (hidden) file input: click anywhere or drop. */
      .dropzone {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        border: 2px dashed var(--border);
        border-radius: 12px;
        padding: 2.6rem 1rem;
        color: var(--muted);
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s, color 0.15s;
      }
      .dropzone:hover { border-color: var(--accent); }
      .dropzone.dragover { border-color: var(--accent); background: var(--tan); color: var(--accent); }
      .disclosures { display: flex; flex-direction: column; align-items: center; gap: 0.7rem; }
      details { border-radius: 8px; text-align: center; }
      summary { cursor: pointer; color: var(--accent); font-size: 0.9rem; list-style: none; user-select: none; text-align: center; }
      summary::-webkit-details-marker { display: none; }
      .panel { margin-top: 0.7rem; display: flex; flex-direction: column; gap: 0.5rem; align-items: center; }
      .panel input[type="password"] {
        padding: 0.55rem 0.7rem;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--field);
        color: var(--field-ink);
        font-size: 1rem;
        width: min(80vw, 320px);
      }
      .check { font-size: 0.85rem; color: var(--muted); }
      .hint { color: var(--muted); font-size: 0.8rem; min-height: 1em; max-width: 34ch; text-align: center; }
      .warn { color: var(--warn); text-align: center; font-size: 0.85rem; min-height: 1em; }
      #stage { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 0.55rem; }
      #stage[hidden] { display: none; }
      /* Explicit white background: the scannable QR must stay dark-on-light for
         the receiver's camera even when the page is in dark mode. */
      canvas#qr { image-rendering: pixelated; border: 1px solid var(--border); border-radius: 8px; max-width: 100%; background: #fff; }
      .plan { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 0.9rem; }
      .status { color: var(--muted); font-size: 0.85rem; min-height: 1em; }
      .cue { color: var(--muted); font-size: 0.85rem; }
      .playbar { display: flex; gap: 1.2rem; align-items: center; flex-wrap: wrap; justify-content: center; }
      .playbar label { font-size: 0.85rem; color: var(--muted); display: flex; align-items: center; gap: 0.3rem; }
      button {
        padding: 0.6rem 1.1rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--ink);
        font-size: 1rem;
        cursor: pointer;
        font-family: var(--sans);
      }
      button.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }
      #receiverqr { width: 150px; height: 150px; border-radius: 8px; }
      #receiverqrcap { font-size: 0.8rem; color: var(--muted); }
    </style>
  </head>
  <body>
    <main>
      <div class="content">
        <h1 class="brand">Blink-Drop</h1>

        <!-- setup: shown only when idle; hidden once a transfer is playing -->
        <div id="setup">
          <p class="tagline">Offline. Nothing uploaded.</p>

          <label class="dropzone" id="dropzone" for="file">Drop files, or click</label>
          <input type="file" id="file" multiple hidden />

          <div class="disclosures">
            <details id="encbox">
              <summary>🔒 Add passphrase</summary>
              <div class="panel">
                <input type="password" id="pass" autocomplete="off" spellcheck="false" placeholder="passphrase" />
                <div id="strength" class="hint"></div>
                <label class="check"><input type="checkbox" id="argon" checked /> Stronger key (Argon2id) — on by default</label>
                <div id="passnote" class="hint"></div>
              </div>
            </details>
            <details id="phonebox">
              <summary>📱 Phone link</summary>
              <div class="panel">
                <canvas id="receiverqr" width="10" height="10"></canvas>
                <div id="receiverqrcap"></div>
              </div>
            </details>
          </div>
        </div>

        <div id="sizewarn" class="warn"></div>
        <div id="caution" class="warn"></div>

        <div id="stage" hidden>
          <canvas id="qr" width="10" height="10"></canvas>
          <div id="plan" class="plan"></div>
          <div class="cue">Keep playing until the phone shows Verified.</div>
          <div class="playbar">
            <button type="button" id="stop">Stop</button>
            <details id="adjustbox">
              <summary>Adjust</summary>
              <div class="panel">
                <label>Speed <input type="range" id="rate" min="2" max="15" value="8" /> <span id="rateVal">8</span></label>
                <label>Size <input type="range" id="scale" min="2" max="12" value="6" /> <span id="scaleVal">6</span></label>
              </div>
            </details>
          </div>
          <div id="status" class="status"></div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/ui/sender.ts"></script>
  </body>
</html>
