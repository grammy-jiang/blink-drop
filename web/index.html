<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23111827'/%3E%3Crect x='9' y='9' width='6' height='6' fill='%23f9fafb'/%3E%3Crect x='17' y='9' width='6' height='6' fill='%23f9fafb'/%3E%3Crect x='9' y='17' width='6' height='6' fill='%23f9fafb'/%3E%3Ccircle cx='20' cy='20' r='4' fill='%232563eb'/%3E%3C/svg%3E" />
    <title>Blink-Drop — Sender</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 900px; }
      h1 { font-size: 1.4rem; }
      #controls { margin: 1rem 0; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
      #plan { margin: 0.5rem 0; color: #333; }
      #status { margin: 0.5rem 0; color: #555; font-variant-numeric: tabular-nums; }
      canvas { image-rendering: pixelated; border: 1px solid #ddd; max-width: 100%; }
      button { padding: 0.3rem 0.8rem; }
      .note { color: #777; font-size: 0.9rem; }
      #receiverqrbox { float: right; text-align: center; margin: 0 0 1rem 1rem; max-width: 170px; }
      #receiverqr { width: 150px; height: 150px; }
      #receiverqrcap { color: #777; font-size: 0.8rem; margin-top: 0.3rem; }
      .passrow { display: block; margin: 0.6rem 0 0.2rem; }
      .passrow input { margin-left: 0.4rem; padding: 0.25rem 0.4rem; }
      #passnote { min-height: 1.2em; }
      .dropzone { border: 2px dashed #cbd5e1; border-radius: 10px; padding: 1rem; margin: 0.4rem 0; display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
      .dropzone.dragover { border-color: #2563eb; background: #eff6ff; }
      .dz-hint { color: #777; font-size: 0.9rem; }
      #sizewarn { color: #b45309; min-height: 1.2em; margin: 0.3rem 0; }
    </style>
  </head>
  <body>
    <h1>Blink-Drop — Sender</h1>
    <div id="receiverqrbox" hidden>
      <canvas id="receiverqr" width="10" height="10"></canvas>
      <div id="receiverqrcap"></div>
    </div>
    <p class="note">Pick or drop a file. It is processed on this machine and never uploaded. Point the phone receiver at the animation; keep it playing until the phone shows Verified.</p>
    <label class="passrow">Passphrase (optional)
      <input type="password" id="pass" autocomplete="off" spellcheck="false" placeholder="leave blank = unencrypted" />
    </label>
    <div id="strength" class="note"></div>
    <label class="passrow"><input type="checkbox" id="argon" /> Stronger key derivation (Argon2id) — slightly slower, loads a small module the first time</label>
    <div id="passnote" class="note"></div>
    <div class="dropzone" id="dropzone">
      <input type="file" id="file" multiple />
      <span class="dz-hint">or drop file(s) here</span>
    </div>
    <div id="sizewarn"></div>
    <div id="plan"></div>
    <div id="controls">
      <label>Rate <input type="range" id="rate" min="2" max="15" value="8" /> <span id="rateVal">8</span> fps</label>
      <label>Size <input type="range" id="scale" min="2" max="12" value="6" /> <span id="scaleVal">6</span> px/module</label>
      <button type="button" id="stop">Stop</button>
    </div>
    <canvas id="qr" width="10" height="10"></canvas>
    <div id="status"></div>
    <script type="module" src="/src/ui/sender.ts"></script>
  </body>
</html>
