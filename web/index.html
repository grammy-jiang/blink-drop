<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Turn one or more files into an animated QR code stream to send them to a nearby phone — processed on your machine, never uploaded. Fully offline."
    />
    <meta name="theme-color" content="#111827" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23111827'/%3E%3Crect x='9' y='9' width='6' height='6' fill='%23f9fafb'/%3E%3Crect x='17' y='9' width='6' height='6' fill='%23f9fafb'/%3E%3Crect x='9' y='17' width='6' height='6' fill='%23f9fafb'/%3E%3Ccircle cx='20' cy='20' r='4' fill='%232563eb'/%3E%3C/svg%3E" />
    <title>Blink-Drop — Sender</title>
    <style>
      /* Shared design language with the receiver (receiver.html): same shell
         (header + centered content), tokens, buttons, and dark mode. */
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }
      header { padding: 0.8rem 1rem; font-weight: 600; }
      main { flex: 1; display: flex; }
      /* `margin: auto` centers the content in both axes AND is overflow-safe:
         it collapses to a top-aligned, scrollable layout when the playing stage
         grows taller than the viewport. */
      .content {
        margin: auto;
        width: 100%;
        max-width: 640px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 1.2rem;
        text-align: center;
      }
      .tagline { color: #6b7280; margin: 0; }
      /* Drop zone is the label for the (hidden) file input: click anywhere or drop. */
      .dropzone {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        border: 2px dashed #cbd5e1;
        border-radius: 12px;
        padding: 2.6rem 1rem;
        color: #6b7280;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s, color 0.15s;
      }
      .dropzone:hover { border-color: #94a3b8; }
      .dropzone.dragover { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
      .disclosures { display: flex; flex-direction: column; align-items: center; gap: 0.7rem; }
      details { border-radius: 8px; text-align: center; }
      summary { cursor: pointer; color: #2563eb; font-size: 0.9rem; list-style: none; user-select: none; text-align: center; }
      summary::-webkit-details-marker { display: none; }
      .panel { margin-top: 0.7rem; display: flex; flex-direction: column; gap: 0.5rem; align-items: center; }
      .panel input[type="password"] {
        padding: 0.55rem 0.7rem;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        background: #fff;
        font-size: 1rem;
        width: min(80vw, 320px);
      }
      .check { font-size: 0.85rem; color: #6b7280; }
      .hint { color: #6b7280; font-size: 0.8rem; min-height: 1em; max-width: 34ch; text-align: center; }
      .warn { color: #b45309; text-align: center; font-size: 0.85rem; min-height: 1em; }
      #stage { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 0.55rem; }
      #stage[hidden] { display: none; }
      canvas#qr { image-rendering: pixelated; border: 1px solid #e5e7eb; border-radius: 8px; max-width: 100%; }
      .plan { font-variant-numeric: tabular-nums; color: #6b7280; font-size: 0.9rem; }
      .status { color: #6b7280; font-size: 0.85rem; min-height: 1em; }
      .cue { color: #6b7280; font-size: 0.85rem; }
      .playbar { display: flex; gap: 1.2rem; align-items: center; flex-wrap: wrap; justify-content: center; }
      .playbar label { font-size: 0.85rem; color: #6b7280; display: flex; align-items: center; gap: 0.3rem; }
      button {
        padding: 0.6rem 1.1rem;
        border-radius: 10px;
        border: 1px solid #d1d5db;
        background: #fff;
        font-size: 1rem;
        cursor: pointer;
      }
      button.primary { background: #111827; color: #fff; border-color: #111827; }
      #receiverqr { width: 150px; height: 150px; border-radius: 8px; }
      #receiverqrcap { font-size: 0.8rem; color: #6b7280; }
      @media (prefers-color-scheme: dark) {
        .dropzone { border-color: #374151; color: #9ca3af; }
        .dropzone.dragover { border-color: #2563eb; background: #1e293b; color: #93c5fd; }
        .panel input[type="password"] { background: #1f2937; color: #f9fafb; border-color: #374151; }
        canvas#qr { border-color: #374151; }
        button { background: #1f2937; color: #f9fafb; border-color: #374151; }
        button.primary { background: #2563eb; border-color: #2563eb; }
      }
    </style>
  </head>
  <body>
    <header>Blink-Drop</header>
    <main>
      <div class="content">
        <p class="tagline">Offline. Nothing uploaded.</p>

        <label class="dropzone" id="dropzone" for="file">Drop files, or click</label>
        <input type="file" id="file" multiple hidden />

        <div class="disclosures">
          <details id="encbox">
            <summary>🔒 Add passphrase</summary>
            <div class="panel">
              <input type="password" id="pass" autocomplete="off" spellcheck="false" placeholder="passphrase" />
              <div id="strength" class="hint"></div>
              <label class="check"><input type="checkbox" id="argon" /> Stronger key (Argon2id)</label>
              <div id="passnote" class="hint"></div>
            </div>
          </details>
          <details id="phonebox">
            <summary>📱 Phone link</summary>
            <div class="panel">
              <canvas id="receiverqr" width="10" height="10"></canvas>
              <div id="receiverqrcap"></div>
            </div>
          </details>
        </div>

        <div id="sizewarn" class="warn"></div>
        <div id="caution" class="warn"></div>

        <div id="stage" hidden>
          <canvas id="qr" width="10" height="10"></canvas>
          <div id="plan" class="plan"></div>
          <div class="cue">Keep playing until the phone shows Verified.</div>
          <div class="playbar">
            <button type="button" id="stop">Stop</button>
            <details id="adjustbox">
              <summary>Adjust</summary>
              <div class="panel">
                <label>Speed <input type="range" id="rate" min="2" max="15" value="8" /> <span id="rateVal">8</span></label>
                <label>Size <input type="range" id="scale" min="2" max="12" value="6" /> <span id="scaleVal">6</span></label>
              </div>
            </details>
          </div>
          <div id="status" class="status"></div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/ui/sender.ts"></script>
  </body>
</html>
