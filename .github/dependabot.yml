version: 2
updates:
  # Web app dependencies. The runtime deps (bc-ur, hash-wasm, jsqr, fflate,
  # qrcode-generator) run in users' browsers with access to plaintext + the
  # passphrase, so keep them current; dev tooling is grouped to cut PR noise.
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        # Group only non-breaking updates. Major dev bumps (e.g. vite 6→8,
        # typescript 5→6) get their own PRs so each migration is reviewed
        # deliberately, not merged in a breaking bulk.
        update-types: ["minor", "patch"]
  # Keep the CI/Pages workflow actions patched.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
