name: Release assets

# When a GitHub Release is published, build the offline single-file sender and
# attach it so people can download the self-contained tool (one HTML file that
# runs anywhere, no clone/build/server) straight from the Releases page.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  attach-offline-sender:
    name: Attach offline sender
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # upload the asset to the release
    defaults:
      run:
        working-directory: web
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@6026fb2ad3aa556d78b517cf65c8c1f832075860 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build offline single-file sender
        run: npm run build:sender
      - name: Attach to the release
        # TAG via env (not ${{ }} in the script) to avoid a shell-injection sink.
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          asset="blink-drop-sender-${TAG}.html"
          cp dist-sender/index.html "$asset"
          gh release upload "$TAG" "$asset" --clobber
