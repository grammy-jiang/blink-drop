name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  web:
    name: web · lint · typecheck · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Biome (lint + format check)
        run: npm run check
      - name: TypeScript typecheck
        run: npm run typecheck
      - name: Unit + vector tests
        run: npm test

  audit:
    name: web · supply-chain audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      # Gate on RUNTIME (shipped) dependencies only — they run in users'
      # browsers with access to plaintext + passphrase. Fail on high/critical;
      # dev-tooling advisories are triaged via Dependabot PRs, not a red build.
      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high

  pre-commit:
    name: pre-commit (all hooks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web deps (needed by local hooks)
        working-directory: web
        run: npm ci
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1
