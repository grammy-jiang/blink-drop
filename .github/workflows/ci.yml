name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: read-only token for every job (raised per-job only where needed).
permissions:
  contents: read

# Cancel superseded runs on the same ref (a new push to a PR stops the old run).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web · lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"] # vite 8 needs Node 20.19+/22.12+
    defaults:
      run:
        working-directory: web
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@6026fb2ad3aa556d78b517cf65c8c1f832075860 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Biome (lint + format check)
        run: npm run check
      - name: TypeScript typecheck
        run: npm run typecheck
      - name: Unit + vector tests (+ coverage gate)
        run: npm run test:coverage
      - name: Coverage summary → job summary
        if: always()
        run: |
          [ -f coverage/coverage-summary.json ] || exit 0
          node -e "const t=require('./coverage/coverage-summary.json').total;const fs=require('fs');const rows=['lines','statements','functions','branches'].map(k=>\`| \${k} | \${t[k].pct}% | \${t[k].covered}/\${t[k].total} |\`).join('\n');fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, \`### Coverage\n\n| metric | % | covered/total |\n|---|---|---|\n\${rows}\n\`);"
      - name: Build (Pages site + offline sender)
        run: npm run build && npm run build:sender
      # Assert the no-egress CSP invariant survives the build (v0.10.0, docs/19).
      # A regression that loosens the policy fails CI instead of shipping silently.
      - name: Verify CSP invariants in built HTML
        run: |
          set -euo pipefail
          echo "both hosted pages must forbid network egress"
          grep -q "connect-src 'none'" dist/receiver.html
          grep -q "connect-src 'none'" dist/index.html
          echo "hosted sender must NOT carry script-src 'unsafe-inline'"
          if grep -oE "script-src[^;]*" dist/index.html | grep -q "unsafe-inline"; then
            echo "::error::hosted sender script-src regained 'unsafe-inline'"; exit 1
          fi
          echo "offline single-file sender inlines its JS, so it DOES keep 'unsafe-inline'"
          grep -oE "script-src[^;]*" dist-sender/index.html | grep -q "unsafe-inline"
          echo "CSP invariants OK"
      # Size budget for the offline single-file sender: it inlines ALL its JS, so
      # a dependency / tree-shaking regression shows up here first (vite 8 bit
      # this once, ~289 → 27 KB-chunk mismatch). Fail the build on a balloon
      # instead of catching it by hand.
      - name: Offline sender size budget
        run: |
          set -euo pipefail
          max=322560 # 315 KiB — ~10% headroom over the current ~285 KiB
          bytes=$(stat -c%s dist-sender/index.html)
          printf 'offline sender: %d bytes (budget %d)\n' "$bytes" "$max"
          if [ "$bytes" -gt "$max" ]; then
            echo "::error::offline sender ${bytes} B exceeds budget ${max} B (+$((bytes - max)) B) — check for a dependency / tree-shaking regression"
            exit 1
          fi

  audit:
    name: web · supply-chain audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: web
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@6026fb2ad3aa556d78b517cf65c8c1f832075860 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      # Gate on RUNTIME (shipped) dependencies only — they run in users'
      # browsers with access to plaintext + passphrase. Fail on high/critical;
      # dev-tooling advisories are triaged via Dependabot PRs, not a red build.
      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high

  dependency-review:
    name: dependency review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@6026fb2ad3aa556d78b517cf65c8c1f832075860 # v5
        with:
          persist-credentials: false
      # Blocks a PR that introduces a high-severity or disallowed-license
      # dependency (repo Dependency Graph enabled 2026-07-08).
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@6026fb2ad3aa556d78b517cf65c8c1f832075860 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Resolve Playwright version
        id: pw
        run: |
          V=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      # Cache hit restores the browser binaries; only the apt system deps need
      # reinstalling. Miss installs both. (Saves the ~browser download each run.)
      - name: Install Playwright browsers + system deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps
      # Real-browser E2E across all three engines: builds the site, serves it
      # (vite preview), and runs the sender + receiver flows + optical round-trips
      # (render→scan→reconstruct→verify, incl. encrypted + tamper-rejection).
      # WebKit = Safari's engine, the receiver's iOS target; getUserMedia-based
      # specs self-skip there (no fake camera device).
      - name: Playwright E2E
        run: npm run e2e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-traces
          path: web/test-results/
          retention-days: 7

  lighthouse:
    name: lighthouse (a11y gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@6026fb2ad3aa556d78b517cf65c8c1f832075860 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install + build
        working-directory: web
        run: npm ci && npm run build
      # Serves web/dist via `vite preview` (correct /blink-drop/ base) and audits
      # the receiver + sender. a11y is a hard gate (was 100 at v0.7.2); SEO /
      # best-practices are warnings.
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          configPath: ./web/lighthouserc.json

  pre-commit:
    name: pre-commit (all hooks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@6026fb2ad3aa556d78b517cf65c8c1f832075860 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web deps (needed by local hooks)
        working-directory: web
        run: npm ci
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
