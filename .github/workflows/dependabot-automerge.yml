name: Dependabot auto-merge

# Auto-merge low-risk Dependabot PRs — patch/minor updates to DEV dependencies
# only — once all required status checks pass. Runtime deps (they run in users'
# browsers) and github-actions updates (the CodeQL init+analyze pair must be
# consolidated by hand) are deliberately left for manual review.
on: pull_request

permissions:
  contents: read

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # enable auto-merge
      pull-requests: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
      - name: Enable auto-merge for patch/minor dev-dependency updates
        if: >-
          steps.meta.outputs.dependency-type == 'direct:development' &&
          (steps.meta.outputs.update-type == 'version-update:semver-patch' ||
           steps.meta.outputs.update-type == 'version-update:semver-minor')
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR"
