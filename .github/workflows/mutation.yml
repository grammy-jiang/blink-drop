name: Mutation testing (core)

# Stryker mutates src/core/** and checks the unit tests actually kill the
# mutations (line coverage alone can't). Slow, so it runs weekly + on demand —
# NOT on every PR.
on:
  schedule:
    - cron: "41 5 * * 1" # Mondays 05:41 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stryker:
    name: Stryker (src/core)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@6026fb2ad3aa556d78b517cf65c8c1f832075860 # v5
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # Stryker 9.6.1's tsconfig preprocessor calls ts.parseConfigFileTextToJson,
      # which TypeScript 7 removed. Give Stryker a TS 6 to read tsconfig with — it
      # only affects Stryker's own config parsing, not the mutants (they run via
      # vitest/esbuild). --no-save keeps the committed lockfile on TS 7. Remove
      # once Stryker supports TS 7.
      - name: Pin TypeScript 6 for Stryker
        run: npm i typescript@6 --no-save
      - name: Mutation test src/core
        run: npm run mutation
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mutation-report
          path: web/reports/mutation/
          retention-days: 14
